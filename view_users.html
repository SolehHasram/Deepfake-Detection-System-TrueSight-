<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Users</title>

<style>
/* Global Navbar Sticky & Font */
body { font-family: 'Inter', sans-serif !important; }
.navbar, .header { 
    position: fixed !important; 
    top: 0 !important; 
    left: 0 !important;
    width: 100vw !important;
    box-sizing: border-box !important;
    z-index: 1000 !important; 
}
/* Navbar Link Animation */
.navbar a:not(.logo), .nav-links a, .header a:not(.logo), .navbar span a {
    position: relative;
    text-decoration: none;
    padding-bottom: 5px;
    color: #008080 !important;
    margin-left: 15px !important;
    font-size: 16px !important;
    font-weight: 500 !important;
}
.navbar a:not(.logo)::after, .nav-links a::after, .header a:not(.logo)::after, .navbar span a::after {
    content: '';
    position: absolute;
    width: 0;
    height: 2px;
    display: block;
    bottom: 0;
    right: 0;
    background: #008080;
    transition: width 0.3s ease;
}
.navbar a:not(.logo):hover::after, .nav-links a:hover::after, .header a:not(.logo):hover::after, .navbar span a:hover::after {
    width: 100%;
    left: 0;
}
</style>
</head>

<body>
    <h2>Registered Users</h2>
    <table border="1">
        <tr>
            <th>ID</th>
            <th>Email</th>
            <th>Username</th>
            <th>Hashed Password</th>
        </tr>
        {% for user in users %}
        <tr>
            <td>{{ user['id'] }}</td>
            <td>{{ user['email'] }}</td>
            <td>{{ user['username'] }}</td>
            <td>{{ user['password'] }}</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
