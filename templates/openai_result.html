<!DOCTYPE html>
<html lang="en">

<head>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expert AI Analysis</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0d1117;
            color: #c9d1d9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 40px;
            max-width: 600px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        h1 {
            color: #58a6ff;
        }

        .analysis-box {
            background-color: #0d1117;
            border-left: 4px solid #8957e5;
            padding: 20px;
            border-radius: 4px;
            margin: 20px 0;
            text-align: left;
            font-size: 16px;
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            background-color: #238636;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            margin-top: 20px;
        }

        .btn:hover {
            background-color: #2ea043;
        }

        img {
            max-width: 100%;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #30363d;
        }
    </style>

<style>
/* Global Navbar Sticky & Font */
body { font-family: 'Inter', sans-serif !important; }
.navbar, .header { 
    position: fixed !important; 
    top: 0 !important; 
    left: 0 !important;
    width: 100vw !important;
    box-sizing: border-box !important;
    z-index: 1000 !important; 
}
/* Navbar Link Animation */
.navbar a:not(.logo), .nav-links a, .header a:not(.logo), .navbar span a {
    position: relative;
    text-decoration: none;
    padding-bottom: 5px;
    color: #008080 !important;
    margin-left: 15px !important;
    font-size: 16px !important;
    font-weight: 500 !important;
}
.navbar a:not(.logo)::after, .nav-links a::after, .header a:not(.logo)::after, .navbar span a::after {
    content: '';
    position: absolute;
    width: 0;
    height: 2px;
    display: block;
    bottom: 0;
    right: 0;
    background: #008080;
    transition: width 0.3s ease;
}
.navbar a:not(.logo):hover::after, .nav-links a:hover::after, .header a:not(.logo):hover::after, .navbar span a:hover::after {
    width: 100%;
    left: 0;
}
</style>
</head>


<body>
    <div class="container">
        <h1>Expert AI Analysis (GPT-4o)</h1>
        <img src="{{ url_for('uploaded_file', filename=filename) }}" alt="Analyzed Media">
        <div class="analysis-box">
            "{{ analysis }}"
        </div>
        <a href="{{ url_for('index') }}" class="btn">Back to Dashboard</a>
    </div>
</body>

</html>
