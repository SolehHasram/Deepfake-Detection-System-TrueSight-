<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f7f7f7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: white;
            padding: 20px 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        .container h1 {
            margin-bottom: 20px;
        }
        .container input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .container button {
            width: 100%;
            padding: 10px;
            background-color: #008080;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>

<style>
/* Global Navbar Sticky & Font */
body { font-family: 'Inter', sans-serif !important; }
.navbar, .header { 
    position: fixed !important; 
    top: 0 !important; 
    left: 0 !important;
    width: 100vw !important;
    box-sizing: border-box !important;
    z-index: 1000 !important; 
}
/* Navbar Link Animation */
.navbar a:not(.logo), .nav-links a, .header a:not(.logo), .navbar span a {
    position: relative;
    text-decoration: none;
    padding-bottom: 5px;
    color: #008080 !important;
    margin-left: 15px !important;
    font-size: 16px !important;
    font-weight: 500 !important;
}
.navbar a:not(.logo)::after, .nav-links a::after, .header a:not(.logo)::after, .navbar span a::after {
    content: '';
    position: absolute;
    width: 0;
    height: 2px;
    display: block;
    bottom: 0;
    right: 0;
    background: #008080;
    transition: width 0.3s ease;
}
.navbar a:not(.logo):hover::after, .nav-links a:hover::after, .header a:not(.logo):hover::after, .navbar span a:hover::after {
    width: 100%;
    left: 0;
}
</style>
</head>

<body>
    <div class="container">
        <h1>Reset Password</h1>
        <form method="POST">
            <label for="password">New Password:</label>
            <input type="password" id="password" name="password" required>
        
            <label for="confirm_password">Confirm Password:</label>
            <input type="password" id="confirm_password" name="confirm_password" required>
        
            <button type="submit">Reset Password</button>
        </form>
        
    </div>
</body>
</html>
